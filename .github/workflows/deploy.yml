name: 'Zero Trust K3s Infrastructure Pipeline'

on:
  workflow_dispatch: 

# 💡 정석: 테라폼 코드(gcp_...)와 1:1로 완벽하게 일치하는 이름표만 딱 3개 선언합니다.
env:
  TF_VAR_gcp_project_id: ${{ secrets.TF_VAR_PROJECT_ID }}
  TF_VAR_gcp_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
  TF_VAR_gcp_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

jobs:
  deploy:
    name: 'Terraform & Ansible Auto Deploy'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCPKEY_JSON }}
          project_id: ${{ secrets.TF_VAR_PROJECT_ID }} 

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # 🚀 정석 실행: 변수 매핑이 완벽하므로 무한 로딩은 발생하지 않습니다.
      - name: Terraform Init & Apply
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Setup SSH Key for Ansible
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Generate Dynamic Inventory
        working-directory: ./terraform
        run: |
          SERVER_IP=$(terraform output -raw k3s_ephemeral_ip)
          mkdir -p ../ansible
          echo "[k3s_nodes]" > ../ansible/inventory.ini
          echo "$SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa" >> ../ansible/inventory.ini

      - name: Run Ansible Playbook
        working-directory: ./ansible
        run: |
          export ANSIBLE_HOST_KEY_CHECKING=False
          ansible-playbook -i inventory.ini site.yml --extra-vars "cloudflare_token=${{ secrets.CLOUDFLARE_TOKEN }}"
