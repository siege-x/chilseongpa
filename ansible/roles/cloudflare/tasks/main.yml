---
# ansible/roles/cloudflare/tasks/main.yml

- name: Cloudflare Tunnel Kubernetes Manifest 파일 생성
  copy:
    dest: /tmp/cloudflared-deployment.yaml
    content: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cloudflared
        namespace: kube-system
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: cloudflared
        template:
          metadata:
            labels:
              app: cloudflared
          spec:
            containers:
            - name: cloudflared
              image: cloudflare/cloudflared:latest
              args:
              - tunnel
              - --no-autoupdate
              - run
              - --token
              - "{{ cloudflare_token }}"
              restartPolicy: Always

- name: K3s 내부에 Cloudflare Tunnel 배포 (Kubernetes Pod 형태)
  command: k3s kubectl apply -f /tmp/cloudflared-deployment.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
